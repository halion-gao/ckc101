<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halion's Blog</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #020408 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --neon-blue: #00f2fe;
            --neon-purple: #9d4edd;
            --glass-bg: rgba(22, 28, 45, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #00f2fe, #4facfe, #9d4edd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            border-radius: 2px;
            margin: 12px auto 0 auto;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .section:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 242, 254, 0.25);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            border-left: 3.5px solid var(--neon-blue);
            padding-left: 10px;
            letter-spacing: 0.5px;
        }

        /* GitHub Widget styling */
        .github-stats-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
        }

        .github-stats-wrapper img {
            border-radius: 6px;
            max-width: 100%;
            height: auto;
            border: none;
        }

        /* IFrame styling */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 800px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: white;
            transition: opacity 0.3s ease;
        }

        /* Loading Spinner */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Cloud Lab Blog</h1>

        <!-- Section 1: GitHub Activity -->
        <div class="section">
            <h3>GitHub Activity</h3>
            <div class="github-stats-wrapper">
                <img src="https://github-readme-stats.vercel.app/api?username=halion-gao&show_icons=true&theme=radical" alt="GitHub Readme Stats" width="100%">
            </div>
        </div>

        <!-- Section 2: Project Documentation -->
        <div class="section">
            <h3>Project Documentation</h3>
            <div class="iframe-wrapper">
                <div class="loading" id="loading-spinner">
                    <div class="spinner"></div>
                    <span>正在下載文件...</span>
                </div>
                <iframe src="https://docs.google.com/document/d/{{ doc_id }}/preview" 
                        width="100%" height="800px"
                        onload="document.getElementById('loading-spinner').style.display='none';"
                        title="Project Documentation"
                        loading="lazy">
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
