<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Guide - 運維部署手冊</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #010204 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --neon-blue: #00f2fe;
            --glass-bg: rgba(22, 28, 45, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glassmorphism Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Back Button */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 8px;
            border-left: 1px solid var(--glass-border);
            padding-left: 8px;
        }

        /* Open button */
        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #0f172a;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.35);
        }

        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            filter: brightness(1.1);
        }

        /* Main Container */
        .content-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 73px);
            padding: 40px 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Blog Post Container */
        .blog-post {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .blog-post h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .blog-post hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, rgba(0, 242, 254, 0.3), rgba(255, 255, 255, 0.05));
            margin-bottom: 24px;
        }

        /* IFrame Wrapper */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 800px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: white;
            transition: opacity 0.3s ease;
        }

        /* Loading Indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-blue);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>返回部落格</span>
            </a>
            <div>
                <span class="brand-title">AWS Guide</span>
                <span class="brand-subtitle">運維部署手冊</span>
            </div>
        </div>
        <a href="https://docs.google.com/document/d/{{ doc_id }}/edit?usp=sharing" target="_blank" rel="noopener noreferrer" class="btn-open">
            <span>在新分頁開啟編輯</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
        </a>
    </header>

    <div class="content-container">
        <div class="blog-post">
            <h2>AWS 部署與架構筆記</h2>
            <hr>
            <div class="iframe-wrapper">
                <div class="loading" id="loading-spinner">
                    <div class="spinner"></div>
                    <span>正在下載運維指南...</span>
                </div>
                <iframe src="https://docs.google.com/document/d/{{ doc_id }}/pub?embedded=true" 
                        width="100%" 
                        height="800px" 
                        frameborder="0"
                        onload="document.getElementById('loading-spinner').style.display='none';"
                        title="AWS Guide Document"
                        loading="lazy">
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
