<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ckc101 - GitHub Repository Preview</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <!-- Marked Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #010204 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --neon-blue: #00f2fe;
            --neon-purple: #9d4edd;
            --glass-bg: rgba(22, 28, 45, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
            --border-hover: rgba(0, 242, 254, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glassmorphism Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 8px;
            border-left: 1px solid var(--glass-border);
            padding-left: 8px;
        }

        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #24292e 0%, #1a1e22 100%);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
        }

        .btn-open:hover {
            border-color: rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.15);
        }

        /* Layout Grid */
        .workspace {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 73px);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.15);
        }

        /* Sidebar - File Explorer */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-tree {
            flex-grow: 1;
            overflow-y: auto;
            padding: 12px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .file-item.active {
            background: rgba(0, 242, 254, 0.08);
            border-left: 2.5px solid var(--neon-blue);
            color: var(--text-primary);
        }

        .file-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Main Preview Container */
        .main-preview {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Card Wrapper */
        .repo-card {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .repo-badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 24px;
        }

        /* Markdown Rendering Styling */
        .markdown-body {
            color: var(--text-primary);
            line-height: 1.65;
            font-size: 0.95rem;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .markdown-body h1 {
            font-size: 1.75rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 8px;
        }

        .markdown-body h2 {
            font-size: 1.4rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 6px;
        }

        .markdown-body p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .markdown-body code {
            font-family: 'Space Grotesk', monospace;
            background: rgba(255, 255, 255, 0.08);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #fda4af;
        }

        .markdown-body pre {
            background: #04050d;
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 16px;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        .markdown-body li {
            margin-bottom: 4px;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--neon-blue);
            background: rgba(0, 242, 254, 0.03);
            padding: 12px 20px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body blockquote p {
            margin-bottom: 0;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>返回部落格</span>
            </a>
            <div>
                <span class="brand-title">ckc101</span>
                <span class="brand-subtitle">GitHub Repository Preview</span>
            </div>
        </div>
        <a href="https://github.com/halion-gao/ckc101" target="_blank" rel="noopener noreferrer" class="btn-open">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span>在 GitHub 上查看</span>
        </a>
    </header>

    <div class="workspace">
        <!-- File Explorer Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
                <span>檔案總覽 (Files)</span>
            </div>
            <ul class="file-tree">
                {% for file in files %}
                <li>
                    <a href="https://github.com/halion-gao/ckc101/blob/main/{{ file }}" 
                       target="_blank" 
                       class="file-item {% if file == 'README.md' %}active{% endif %}">
                        <!-- Icon according to file types -->
                        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            {% if file.endswith('.py') %}
                                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                                <polyline points="2 17 12 22 22 17"></polyline>
                                <polyline points="2 12 12 17 22 12"></polyline>
                            {% elif file.endswith('.html') %}
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            {% elif file.endswith('.css') %}
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                            {% else %}
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            {% endif %}
                        </svg>
                        <span>{{ file }}</span>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </aside>

        <!-- Main Preview Area -->
        <main class="main-preview">
            <div class="repo-card">
                <div class="repo-badge-row">
                    <img src="https://github-readme-stats.vercel.app/api/pin/?username=halion-gao&repo=ckc101&theme=radical" alt="Repository Pin Stats">
                </div>

                <!-- Hidden element containing raw markdown -->
                <textarea id="raw-markdown" style="display: none;">{{ readme }}</textarea>
                
                <!-- Rendered Markdown Output -->
                <div class="markdown-body" id="readme-rendered">
                    <!-- JavaScript will parse and place README here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Script to render Markdown -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawMarkdown = document.getElementById('raw-markdown').value;
            if (rawMarkdown.trim()) {
                document.getElementById('readme-rendered').innerHTML = marked.parse(rawMarkdown);
            } else {
                document.getElementById('readme-rendered').innerHTML = '<p style="color: var(--text-secondary)">No README.md content available.</p>';
            }
        });
    </script>
</body>
</html>
